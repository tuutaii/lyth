name: Send Daily Push Notifications

on:
  schedule:
    # Chạy mỗi 5 phút một lần
    - cron: '*/5 * * * *'
  # Cho phép kích hoạt chạy thử thủ công bằng nút "Run workflow" trên GitHub
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Caching pip dependencies để tăng tốc độ chạy lần sau

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin pytz

      - name: Run notification sender script
        env:
          FIREBASE_KEY_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python scripts/send_daily_notifications.py

name: Send Daily Push Notifications

on:
  schedule:
    # Tối ưu cho Repo Private: Chạy mỗi 30 phút một lần (tiết kiệm phút miễn phí của GitHub Actions)
    # Tổng tiêu thụ: 48 lần/ngày * 30 ngày = 1440 phút/tháng (nằm hoàn toàn trong hạn mức 2000 phút free của Private Repo)
    - cron: '*/30 * * * *'
  # Cho phép kích hoạt chạy thử thủ công bằng nút "Run workflow" trên GitHub
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin pytz

      - name: Run notification sender script
        env:
          FIREBASE_KEY_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python scripts/send_daily_notifications.py
